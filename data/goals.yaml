# =============================================================
# Financial Goals
# =============================================================
# Define your long-term wealth goals here.
#
# target_multiplier: how many times you want to grow (e.g. 1000)
# target_years: time horizon
# start_date: when you started investing toward this goal
# initial_corpus: your starting portfolio value in INR
# =============================================================

goals:
  - name: "1000x Wealth Builder"
    target_multiplier: 1000
    target_years: 20
    start_date: "2024-01-01"
    initial_corpus: 500000    # ₹5 lakh starting corpus

  - name: "Financial Freedom (100x)"
    target_multiplier: 100
    target_years: 15
    start_date: "2024-01-01"
    initial_corpus: 500000

  - name: "First Crore"
    target_multiplier: 20      # 5L → 1Cr = 20x
    target_years: 10
    start_date: "2024-01-01"
    initial_corpus: 500000
